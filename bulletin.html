<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulletin - SermonScribe v4</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>.bulletin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }.bulletin-card h3 { margin: 0 0 .5rem; }.bulletin-card .meta { font-size: .8rem; color: var(--text-muted); margin-bottom: .5rem; }.bulletin-card .content { white-space: pre-wrap; }.section-header { background: var(--primary); color: #fff; padding: .5rem 1rem; border-radius: var(--radius-sm); margin: 1rem 0 .5rem; }</style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./index.html"><div class="brand-logo">&#10013;</div><div class="brand-text"><span class="brand-title">SermonScribe v4</span><span class="brand-sub">Church Bulletin</span></div></a>
    <nav class="header-nav"><a href="./index.html">Home</a><a href="./analytics.html">Analytics</a><a href="./notes.html">Notes</a><a href="./devotions.html">Devotions</a></nav>
  </header>
  <main style="max-width:800px;margin:0 auto;padding:1rem;">
    <h1>Weekly Church Bulletin</h1>
    <p>Create and manage your church's weekly bulletin.</p>
    <button class="btn btn-primary" onclick="openBulletinModal()">+ New Bulletin Entry</button>
    <div id="bulletins-container" style="margin-top:1rem;"></div>
  </main>
  <div id="bulletin-modal" class="modal-overlay" aria-hidden="true"><div class="modal modal-lg">
    <h2>New Bulletin Entry</h2>
    <div class="form-group"><label for="bull-title">Title</label><input type="text" id="bull-title" placeholder="e.g., Sunday Service Announcement"></div>
    <div class="form-group"><label for="bull-section">Section</label><select id="bull-section"><option value="announcements">Announcements</option><option value="events">Events</option><option value="prayer">Prayer Requests</option><option value="giving">Giving and Tithes</option><option value="welcome">Welcome</option><option value="sermon">Sermon Notes</option><option value="other">Other</option></select></div>
    <div class="form-group"><label for="bull-date">Date</label><input type="date" id="bull-date"></div>
    <div class="form-group"><label for="bull-content">Content</label><textarea id="bull-content" rows="6" placeholder="Bulletin content..." style="width:100%;font-family:inherit;font-size:.95rem;padding:.55rem .75rem;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);resize:vertical"></textarea></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveBulletin()">Save</button><button class="btn btn-ghost" onclick="closeBulletinModal()">Cancel</button></div>
  </div></div>
  <script type="module">
    import { saveBulletin, loadBulletins, deleteBulletin } from './assets/js/storage.js';
    import { generateId, getTimestamp, escapeHtml } from './assets/js/utils.js';
    window.openBulletinModal = () => { document.getElementById('bulletin-modal').classList.add('open'); document.getElementById('bull-date').value = new Date().toISOString().split('T')[0]; };
    window.closeBulletinModal = () => { document.getElementById('bulletin-modal').classList.remove('open'); document.getElementById('bull-title').value = ''; document.getElementById('bull-content').value = ''; };
    window.saveBulletin = async () => {
      const title = document.getElementById('bull-title').value; const section = document.getElementById('bull-section').value; const date = document.getElementById('bull-date').value; const content = document.getElementById('bull-content').value;
      if (!title || !content) { alert('Please fill in title and content.'); return; }
      await saveBulletin({ id: generateId(), title, section, date, content, createdAt: getTimestamp() });
      closeBulletinModal(); loadBulletinsList();
    };
    async function loadBulletinsList() {
      const container = document.getElementById('bulletins-container'); const bulletins = await loadBulletins(100);
      if (!bulletins.length) { container.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-muted);">No bulletins yet.</p>'; return; }
      const sections = {}; bulletins.forEach(b => { if (!sections[b.section]) sections[b.section] = []; sections[b.section].push(b); });
      const sectionIcons = { announcements: 'Announcements', events: 'Events', prayer: 'Prayer Requests', giving: 'Giving and Tithes', welcome: 'Welcome', sermon: 'Sermon Notes', other: 'Other' };
      let html = '';
      for (const [section, items] of Object.entries(sections)) {
        html += `<div class="section-header">${sectionIcons[section] || section}</div>`;
        items.forEach(b => { html += `<div class="bulletin-card"><h3>${escapeHtml(b.title)}</h3><div class="meta">${b.date} | ${new Date(b.createdAt).toLocaleString()}</div><div class="content">${escapeHtml(b.content)}</div><button class="btn btn-sm btn-danger" style="margin-top:.5rem" onclick="window.deleteBull('${b.id}')">Delete</button></div>`; });
      }
      container.innerHTML = html;
    }
    window.deleteBull = async (id) => { if (!confirm('Delete this bulletin entry?')) return; await deleteBulletin(id); loadBulletinsList(); };
    loadBulletinsList();
  </script>
</body>
</html>
