<!DOCTYPE html>
<html lang="en">
<head>

  <style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}.offline-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:3rem;max-width:500px}.offline-card h1{font-size:3rem;margin:0 0 1rem}</style>
