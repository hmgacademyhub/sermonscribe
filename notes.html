<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - SermonScribe v4</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>.note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }.note-card h3 { margin: 0 0 .5rem; }.note-card .meta { font-size: .8rem; color: var(--text-muted); margin-bottom: .5rem; }.note-card .content { white-space: pre-wrap; }</style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./index.html"><div class="brand-logo">&#10013;</div><div class="brand-text"><span class="brand-title">SermonScribe v4</span><span class="brand-sub">Sermon Notes</span></div></a>
    <nav class="header-nav"><a href="./index.html">Home</a><a href="./analytics.html">Analytics</a><a href="./devotions.html">Devotions</a></nav>
  </header>
  <main style="max-width:800px;margin:0 auto;padding:1rem;">
    <h1>Personal Sermon Notes</h1>
    <p>Take and organize notes from sermons you've attended.</p>
    <button class="btn btn-primary" onclick="newNote()">+ New Note</button>
    <div id="notes-container" style="margin-top:1rem;"></div>
  </main>
  <div id="note-modal" class="modal-overlay" aria-hidden="true"><div class="modal modal-lg">
    <h2>New Sermon Note</h2>
    <div class="form-group"><label for="note-sermon">Sermon Title</label><input type="text" id="note-sermon" placeholder="Which sermon is this for?"></div>
    <div class="form-group"><label for="note-date">Date</label><input type="date" id="note-date"></div>
    <div class="form-group"><label for="note-content">Notes</label><textarea id="note-content" rows="10" placeholder="Write your notes here..." style="width:100%;font-family:inherit;font-size:.95rem;padding:.55rem .75rem;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);resize:vertical"></textarea></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveNote()">Save</button><button class="btn btn-ghost" onclick="closeNoteModal()">Cancel</button></div>
  </div></div>
  <script type="module">
    import { saveNote, loadNotesBySermon } from './assets/js/storage.js';
    import { generateId, getTimestamp } from './assets/js/utils.js';
    window.newNote = () => { document.getElementById('note-modal').classList.add('open'); document.getElementById('note-date').value = new Date().toISOString().split('T')[0]; };
    window.closeNoteModal = () => { document.getElementById('note-modal').classList.remove('open'); document.getElementById('note-sermon').value = ''; document.getElementById('note-content').value = ''; };
    window.saveNote = async () => {
      const sermon = document.getElementById('note-sermon').value; const date = document.getElementById('note-date').value; const content = document.getElementById('note-content').value;
      if (!sermon || !content) { alert('Please fill in sermon title and notes.'); return; }
      await saveNote({ id: generateId(), sermonId: sermon, sermon, date, content, createdAt: getTimestamp() });
      closeNoteModal(); loadNotes();
    };
    async function loadNotes() {
      const container = document.getElementById('notes-container');
      const notes = await loadNotesBySermon('');
      if (!notes.length) { container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">No notes yet. Click "+ New Note" to start.</p>'; return; }
      container.innerHTML = notes.map(n => `<div class="note-card"><h3>${n.sermon || 'Untitled'}</h3><div class="meta">${n.date} | ${new Date(n.createdAt).toLocaleString()}</div><div class="content">${n.content}</div></div>`).join('');
    }
    loadNotes();
  </script>
</body>
</html>
