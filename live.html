<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Captions - SermonScribe v4</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    body { padding: 1rem; background: #000; color: #fff; font-size: 1.5rem; }
    #live-caption { padding: 2rem; min-height: 60vh; background: #111; border-radius: 12px; margin-top: 1rem; white-space: pre-wrap; line-height: 1.8; }
    .live-dot { display: inline-block; width: 12px; height: 12px; background: #dc2626; border-radius: 50%; animation: pulse 1s infinite; margin-right: .5rem; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    #elapsed { font-size: 1.2rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 0;">
    <div style="display:flex;align-items:center;gap:.5rem;"><span class="live-dot"></span><span style="font-weight:700;">Live Captions</span></div>
    <span id="elapsed">0:00</span>
  </div>
  <div id="live-caption">Waiting for transcription...</div>
  <script>
    const channel = new BroadcastChannel('sermonscribe-live');
    const captionEl = document.getElementById('live-caption');
    const elapsedEl = document.getElementById('elapsed');
    let fullText = '';
    channel.onmessage = (e) => {
      if (e.data.type === 'transcript') {
        fullText += e.data.text + ' ';
        captionEl.textContent = fullText;
        const mins = Math.floor(e.data.elapsed/60), secs = (e.data.elapsed%60).toString().padStart(2,'0');
        elapsedEl.textContent = `${mins}:${secs}`;
        captionEl.scrollTop = captionEl.scrollHeight;
      }
    };
  </script>
</body>
</html>
