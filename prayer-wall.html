<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer Wall - SermonScribe v4</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>.prayer-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }.prayer-card .request { font-size: 1.05rem; margin-bottom: .5rem; }.prayer-card .meta { font-size: .8rem; color: var(--text-muted); }.prayer-card .actions { margin-top: .75rem; display: flex; gap: .5rem; }.prayed-btn { padding: .25rem .5rem; font-size: .8rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface-raised); color: var(--text); }.prayed-btn.prayed { background: var(--success); color: #fff; border-color: var(--success); }</style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./index.html"><div class="brand-logo">&#10013;</div><div class="brand-text"><span class="brand-title">SermonScribe v4</span><span class="brand-sub">Prayer Wall</span></div></a>
    <nav class="header-nav"><a href="./index.html">Home</a><a href="./analytics.html">Analytics</a><a href="./notes.html">Notes</a><a href="./devotions.html">Devotions</a><a href="./bulletin.html">Bulletin</a></nav>
  </header>
  <main style="max-width:800px;margin:0 auto;padding:1rem;">
    <h1>Community Prayer Wall</h1>
    <p>Submit prayer requests and pray for others.</p>
    <button class="btn btn-primary" onclick="openPrayerModal()">Submit Prayer Request</button>
    <div id="prayers-container" style="margin-top:1rem;"></div>
  </main>
  <div id="prayer-modal" class="modal-overlay" aria-hidden="true"><div class="modal modal-lg">
    <h2>Submit Prayer Request</h2>
    <div class="form-group"><label for="prayer-name">Your Name (optional)</label><input type="text" id="prayer-name" placeholder="Anonymous"></div>
    <div class="form-group"><label for="prayer-request">Prayer Request</label><textarea id="prayer-request" rows="5" placeholder="Share your prayer request..." style="width:100%;font-family:inherit;font-size:.95rem;padding:.55rem .75rem;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);resize:vertical"></textarea></div>
    <div class="form-group"><label for="prayer-category">Category</label><select id="prayer-category"><option value="healing">Healing</option><option value="family">Family</option><option value="financial">Financial</option><option value="spiritual">Spiritual Growth</option><option value="guidance">Guidance</option><option value="protection">Protection</option><option value="thanksgiving">Thanksgiving</option><option value="other">Other</option></select></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="savePrayer()">Submit</button><button class="btn btn-ghost" onclick="closePrayerModal()">Cancel</button></div>
  </div></div>
  <script type="module">
    import { savePrayer, loadPrayers, deletePrayer } from './assets/js/storage.js';
    import { generateId, getTimestamp, escapeHtml } from './assets/js/utils.js';
    window.openPrayerModal = () => document.getElementById('prayer-modal').classList.add('open');
    window.closePrayerModal = () => document.getElementById('prayer-modal').classList.remove('open');
    window.savePrayer = async () => {
      const name = document.getElementById('prayer-name').value || 'Anonymous'; const request = document.getElementById('prayer-request').value; const category = document.getElementById('prayer-category').value;
      if (!request) { alert('Please enter your prayer request.'); return; }
      await savePrayer({ id: generateId(), name: escapeHtml(name), request: escapeHtml(request), category, prayedCount: 0, prayedBy: [], createdAt: getTimestamp() });
      closePrayerModal(); loadPrayersList();
    };
    async function loadPrayersList() {
      const container = document.getElementById('prayers-container'); const prayers = await loadPrayers(100);
      if (!prayers.length) { container.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-muted);">No prayer requests yet. Be the first to share.</p>'; return; }
      container.innerHTML = prayers.map(p => `<div class="prayer-card"><div class="request">${p.request}</div><div class="meta">By: ${p.name || 'Anonymous'} | ${new Date(p.createdAt).toLocaleDateString()}</div><div class="actions"><button class="prayed-btn ${p.prayedBy?.includes('you') ? 'prayed' : ''}" onclick="window.togglePrayed('${p.id}', ${p.prayedCount || 0})">I've Prayed (${p.prayedCount || 0})</button><button class="btn btn-sm btn-danger" onclick="window.deletePray('${p.id}')">Delete</button></div></div>`).join('');
    }
    window.togglePrayed = async (id, count) => {
      const prayers = await loadPrayers(100); const prayer = prayers.find(p => p.id === id); if (!prayer) return;
      prayer.prayedCount = count + 1; if (!prayer.prayedBy) prayer.prayedBy = []; prayer.prayedBy.push('you');
      await savePrayer(prayer); loadPrayersList();
    };
    window.deletePray = async (id) => { if (!confirm('Delete this prayer request?')) return; await deletePrayer(id); loadPrayersList(); };
    loadPrayersList();
  </script>
</body>
</html>
