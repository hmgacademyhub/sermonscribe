<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devotions - SermonScribe v4</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>.devotion-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }.devotion-card h3 { margin: 0 0 .5rem; color: var(--accent); }.devotion-card .meta { font-size: .8rem; color: var(--text-muted); margin-bottom: .75rem; }.devotion-card .scripture { font-style: italic; border-left: 3px solid var(--accent); padding-left: 1rem; margin: .75rem 0; }</style>
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./index.html"><div class="brand-logo">&#10013;</div><div class="brand-text"><span class="brand-title">SermonScribe v4</span><span class="brand-sub">Daily Devotions</span></div></a>
    <nav class="header-nav"><a href="./index.html">Home</a><a href="./analytics.html">Analytics</a><a href="./notes.html">Notes</a></nav>
  </header>
  <main style="max-width:800px;margin:0 auto;padding:1rem;">
    <h1>Daily Devotions</h1>
    <p>Generate and manage 5-day devotionals from your sermons.</p>
    <button class="btn btn-primary" onclick="openDevotionModal()">+ New Devotion</button>
    <div id="devotions-container" style="margin-top:1rem;"></div>
  </main>
  <div id="devotion-modal" class="modal-overlay" aria-hidden="true"><div class="modal modal-lg">
    <h2>Create 5-Day Devotional</h2>
    <div class="form-group"><label for="dev-title">Title</label><input type="text" id="dev-title" placeholder="e.g., Walking in Faith"></div>
    <div class="form-group"><label for="dev-sermon">Based on Sermon</label><input type="text" id="dev-sermon" placeholder="Sermon title or source"></div>
    <div class="form-group"><label for="dev-theme">Main Theme</label><input type="text" id="dev-theme" placeholder="e.g., Faith, Grace, Love"></div>
    <div class="form-group"><label for="dev-scripture">Key Scripture</label><input type="text" id="dev-scripture" placeholder="e.g., Romans 8:28"></div>
    <div class="form-group"><label for="dev-content">Content</label><textarea id="dev-content" rows="8" placeholder="Write the devotional content..." style="width:100%;font-family:inherit;font-size:.95rem;padding:.55rem .75rem;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);resize:vertical"></textarea></div>
    <div class="form-actions"><button class="btn btn-primary" onclick="saveDevotion()">Save</button><button class="btn btn-ghost" onclick="closeDevotionModal()">Cancel</button></div>
  </div></div>
  <script type="module">
    import { saveDevotion, loadDevotions, deleteDevotion } from './assets/js/storage.js';
    import { generateId, getTimestamp, escapeHtml } from './assets/js/utils.js';
    window.openDevotionModal = () => document.getElementById('devotion-modal').classList.add('open');
    window.closeDevotionModal = () => document.getElementById('devotion-modal').classList.remove('open');
    window.saveDevotion = async () => {
      const title = document.getElementById('dev-title').value; const sermon = document.getElementById('dev-sermon').value; const theme = document.getElementById('dev-theme').value; const scripture = document.getElementById('dev-scripture').value; const content = document.getElementById('dev-content').value;
      if (!title || !content) { alert('Please fill in title and content.'); return; }
      await saveDevotion({ id: generateId(), title, sermon, theme, scripture, content, createdAt: getTimestamp() });
      closeDevotionModal(); loadDevotionsList();
    };
    async function loadDevotionsList() {
      const container = document.getElementById('devotions-container'); const devotions = await loadDevotions(100);
      if (!devotions.length) { container.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--text-muted);">No devotions yet.</p>'; return; }
      container.innerHTML = devotions.map(d => `<div class="devotion-card"><h3>${d.title}</h3><div class="meta">Based on: ${d.sermon || 'N/A'} | Theme: ${d.theme || 'N/A'} | ${d.scripture || ''}</div><div class="scripture">${d.scripture || ''}</div><div>${d.content}</div><button class="btn btn-sm btn-danger" style="margin-top:.5rem" onclick="window.deleteDev('${d.id}')">Delete</button></div>`).join('');
    }
    window.deleteDev = async (id) => { if (!confirm('Delete this devotion?')) return; await deleteDevotion(id); loadDevotionsList(); };
    loadDevotionsList();
  </script>
</body>
</html>
